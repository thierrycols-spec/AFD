<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AFD">
<meta name="theme-color" content="#1F3864">
<title>AFD — Fraude Documentaire</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --navy:   #1F3864;
  --blue:   #2E75B6;
  --bluelt: #4A90D9;
  --gold:   #C8973A;
  --cream:  #F4F1EB;
  --white:  #FFFFFF;
  --gray:   #6B7280;
  --graylt: #E8EDF4;
  --text:   #1A2332;
  --red:    #DC2626;
  --green:  #15803D;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top:    env(safe-area-inset-top, 0px);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
  height: 100%;
  font-family: 'Syne', sans-serif;
  background: var(--cream);
  color: var(--text);
  overflow: hidden;
  position: fixed;
  width: 100%;
}

/* ── STRUCTURE ── */
#app {
  display: flex;
  flex-direction: column;
  height: 100%;
  height: 100dvh;
}

/* ── TOPBAR ── */
#topbar {
  background: var(--navy);
  padding: calc(var(--safe-top) + 10px) 16px 10px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}

.topbar-icon {
  width: 34px; height: 34px;
  background: var(--gold);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}

.topbar-title {
  font-size: 16px;
  font-weight: 800;
  color: var(--white);
  letter-spacing: -0.2px;
}

.topbar-sub {
  font-size: 10px;
  color: rgba(255,255,255,0.5);
  font-family: 'DM Mono', monospace;
  margin-left: auto;
  flex-shrink: 0;
}

/* ── SCREENS ── */
#screens {
  flex: 1;
  overflow: hidden;
  position: relative;
}

.screen {
  position: absolute;
  inset: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  display: none;
  flex-direction: column;
}

.screen.active { display: flex; }

/* ── BOTTOM NAV ── */
#bottomnav {
  background: var(--white);
  border-top: 1px solid var(--graylt);
  display: flex;
  padding-bottom: var(--safe-bottom);
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}

.nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  padding: 10px 4px;
  background: none;
  border: none;
  cursor: pointer;
  transition: all 0.15s;
}

.nav-btn .nav-icon { font-size: 22px; opacity: 0.4; transition: all 0.15s; }
.nav-btn .nav-label { font-size: 10px; font-weight: 600; color: var(--gray); transition: all 0.15s; letter-spacing: 0.3px; }

.nav-btn.active .nav-icon { opacity: 1; }
.nav-btn.active .nav-label { color: var(--navy); }
.nav-btn:active { transform: scale(0.92); }

/* ══════════════════════════════════
   ÉCRAN 1 — VÉRIFICATEUR
══════════════════════════════════ */

/* Barre recherche */
#search-bar {
  padding: 12px 14px;
  background: var(--white);
  border-bottom: 1px solid var(--graylt);
  flex-shrink: 0;
  position: sticky;
  top: 0;
  z-index: 5;
}

#search-input {
  width: 100%;
  padding: 10px 14px 10px 38px;
  border-radius: 10px;
  border: 1.5px solid var(--graylt);
  font-family: 'Syne', sans-serif;
  font-size: 14px;
  background: var(--cream);
  color: var(--text);
  outline: none;
  position: relative;
}

#search-input:focus { border-color: var(--blue); background: var(--white); }

.search-wrap { position: relative; }
.search-icon {
  position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
  font-size: 16px; pointer-events: none;
}

/* Catégories scroll horizontal */
#cats-bar {
  padding: 10px 14px;
  display: flex;
  gap: 8px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  flex-shrink: 0;
  scrollbar-width: none;
  background: var(--white);
  border-bottom: 1px solid var(--graylt);
}
#cats-bar::-webkit-scrollbar { display: none; }

.cat-pill {
  flex-shrink: 0;
  padding: 6px 12px;
  border-radius: 20px;
  border: 1.5px solid var(--graylt);
  background: var(--cream);
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 600;
  color: var(--gray);
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
  display: flex; align-items: center; gap: 5px;
}

.cat-pill.active {
  background: var(--navy);
  border-color: var(--navy);
  color: var(--white);
}

.cat-pill:active { transform: scale(0.95); }

/* Filtre région */
#region-bar {
  padding: 8px 14px;
  display: flex;
  gap: 6px;
  flex-shrink: 0;
  background: var(--cream);
}

.region-btn {
  padding: 5px 12px;
  border-radius: 6px;
  border: 1.5px solid var(--graylt);
  background: var(--white);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  color: var(--gray);
  cursor: pointer;
  transition: all 0.15s;
}

.region-btn.active {
  background: var(--blue);
  border-color: var(--blue);
  color: var(--white);
}

/* Compteur */
#count-bar {
  padding: 6px 14px;
  font-size: 11px;
  color: var(--gray);
  font-family: 'DM Mono', monospace;
  flex-shrink: 0;
}

/* Cards liste */
#cards-list {
  padding: 0 14px 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* Séparateurs région */
.region-sep {
  font-size: 11px;
  font-weight: 700;
  color: var(--navy);
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.5px;
  padding: 10px 0 4px;
  border-bottom: 2px solid var(--blue);
  margin-bottom: 2px;
}

/* Card pays */
.country-card {
  background: var(--white);
  border-radius: 12px;
  border: 1.5px solid var(--graylt);
  overflow: hidden;
}

.card-head {
  padding: 12px 14px 10px;
  display: flex;
  align-items: center;
  gap: 10px;
  background: linear-gradient(135deg, var(--navy), #2A4F8A);
}

.card-flag { font-size: 24px; flex-shrink: 0; }

.card-name {
  font-size: 14px;
  font-weight: 700;
  color: var(--white);
  line-height: 1.2;
}

.card-code {
  font-size: 10px;
  color: rgba(255,255,255,0.4);
  font-family: 'DM Mono', monospace;
}

.card-links { padding: 8px 10px; display: flex; flex-direction: column; gap: 6px; }

.link-row {
  display: flex;
  align-items: center;
  gap: 6px;
}

.link-btn {
  flex: 1;
  padding: 9px 12px;
  background: var(--cream);
  border: 1px solid var(--graylt);
  border-radius: 8px;
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  font-weight: 600;
  color: var(--navy);
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 6px;
  line-height: 1.3;
  transition: background 0.15s;
}

.link-btn:active { background: var(--graylt); }

.link-btn .link-ext { font-size: 10px; opacity: 0.5; flex-shrink: 0; }

.tr-btn {
  flex-shrink: 0;
  width: 34px; height: 34px;
  display: flex; align-items: center; justify-content: center;
  background: var(--graylt);
  border-radius: 8px;
  border: 1px solid #CBD5E1;
  font-size: 14px;
  text-decoration: none;
  transition: background 0.15s;
}

.tr-btn:active { background: #d0daea; }

/* Tag */
.tag {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  font-weight: 500;
  padding: 2px 6px;
  border-radius: 4px;
  flex-shrink: 0;
  white-space: nowrap;
}

.t-free    { background:#E8F5E9; color:#2E7D32; border:1px solid #A5D6A7; }
.t-login   { background:#FFF3E0; color:#E65100; border:1px solid #FFCC80; }
.t-partial { background:#E3F2FD; color:#1565C0; border:1px solid #90CAF9; }

/* Vide */
.empty-state {
  padding: 40px 20px;
  text-align: center;
  color: var(--gray);
}
.empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; }

/* ══════════════════════════════════
   ÉCRAN 2 — BASES DE RÉFÉRENCE
══════════════════════════════════ */

#screen-ref {
  background: var(--cream);
}

.ref-header {
  padding: 16px 14px 12px;
  background: var(--white);
  border-bottom: 1px solid var(--graylt);
  flex-shrink: 0;
}

.ref-header h2 {
  font-size: 16px;
  font-weight: 800;
  color: var(--navy);
}

.ref-header p {
  font-size: 12px;
  color: var(--gray);
  margin-top: 3px;
  font-family: 'DM Mono', monospace;
}

.ref-list {
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.ref-card {
  background: var(--white);
  border-radius: 14px;
  border: 1.5px solid var(--graylt);
  overflow: hidden;
  transition: transform 0.15s;
}

.ref-card:active { transform: scale(0.98); }

.ref-card-head {
  background: linear-gradient(135deg, var(--navy) 0%, #2A4F8A 100%);
  padding: 14px 16px 12px;
  position: relative;
  overflow: hidden;
}

.ref-card-head::after {
  content: '';
  position: absolute;
  top: -20px; right: -20px;
  width: 70px; height: 70px;
  border-radius: 50%;
  background: rgba(255,255,255,0.05);
}

.ref-type {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  color: var(--gold);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 5px;
}

.ref-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--white);
  line-height: 1.3;
}

.ref-origin {
  font-size: 11px;
  color: rgba(255,255,255,0.45);
  margin-top: 3px;
  font-weight: 400;
}

.ref-body {
  padding: 12px 16px;
}

.ref-desc {
  font-size: 12px;
  color: var(--gray);
  line-height: 1.6;
  margin-bottom: 10px;
  font-weight: 400;
}

.ref-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-bottom: 12px;
}

.rtag {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  font-weight: 500;
  padding: 3px 8px;
  border-radius: 4px;
}

.rtag-free    { background:#E8F5E9; color:#2E7D32; border:1px solid #A5D6A7; }
.rtag-login   { background:#FFF3E0; color:#E65100; border:1px solid #FFCC80; }
.rtag-partial { background:#E3F2FD; color:#1565C0; border:1px solid #90CAF9; }
.rtag-world   { background:#F3E5F5; color:#6A1B9A; border:1px solid #CE93D8; }
.rtag-eu      { background:#E8EDF4; color:var(--navy); border:1px solid #B5C7DF; }
.rtag-permit  { background:#FFF8E1; color:#F57F17; border:1px solid #FFE082; }

.ref-actions {
  display: flex;
  gap: 8px;
}

.ref-btn-main {
  flex: 1;
  padding: 10px 14px;
  background: var(--navy);
  color: var(--white);
  border-radius: 8px;
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 700;
  text-decoration: none;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: background 0.15s;
}

.ref-btn-main:active { background: var(--blue); }

.ref-btn-tr {
  flex-shrink: 0;
  width: 40px; height: 40px;
  background: var(--graylt);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  text-decoration: none;
  border: 1px solid #CBD5E1;
}

/* ══════════════════════════════════
   ANIMATIONS
══════════════════════════════════ */

.screen.active .country-card,
.screen.active .ref-card {
  animation: slideUp 0.25s ease both;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

.screen.active .country-card:nth-child(2) { animation-delay: 0.03s; }
.screen.active .country-card:nth-child(3) { animation-delay: 0.06s; }
.screen.active .country-card:nth-child(4) { animation-delay: 0.09s; }
.screen.active .country-card:nth-child(5) { animation-delay: 0.12s; }
.screen.active .ref-card:nth-child(2) { animation-delay: 0.04s; }
.screen.active .ref-card:nth-child(3) { animation-delay: 0.08s; }
.screen.active .ref-card:nth-child(4) { animation-delay: 0.12s; }
.screen.active .ref-card:nth-child(5) { animation-delay: 0.16s; }

</style>
</head>
<body>

<div id="app">

  <!-- TOPBAR -->
  <div id="topbar">
    <div class="topbar-icon">🔍</div>
    <div>
      <div class="topbar-title">AFD</div>
    </div>
    <div class="topbar-sub">Fraude Documentaire</div>
  </div>

  <!-- SCREENS -->
  <div id="screens">

    <!-- ÉCRAN 1 : VÉRIFICATEUR -->
    <div class="screen active" id="screen-verif">

      <!-- Recherche -->
      <div id="search-bar">
        <div class="search-wrap">
          <span class="search-icon">🔎</span>
          <input id="search-input" type="search" placeholder="Pays, code…" autocomplete="off" autocorrect="off" spellcheck="false">
        </div>
      </div>

      <!-- Catégories -->
      <div id="cats-bar">
        <button class="cat-pill active" data-cat="all">Tout</button>
      </div>

      <!-- Région -->
      <div id="region-bar">
        <button class="region-btn active" data-region="all">🌍 Tous</button>
        <button class="region-btn" data-region="EU">🇪🇺 Europe</button>
        <button class="region-btn" data-region="Monde">🌐 Monde</button>
      </div>

      <!-- Compteur -->
      <div id="count-bar">—</div>

      <!-- Liste -->
      <div id="cards-list"></div>
    </div>

    <!-- ÉCRAN 2 : BASES DE RÉFÉRENCE -->
    <div class="screen" id="screen-ref">
      <div class="ref-header">
        <h2>📚 Bases de Référence</h2>
        <p>Consultation de spécimens officiels en ligne</p>
      </div>
      <div class="ref-list" id="ref-list"></div>
    </div>

  </div>

  <!-- BOTTOM NAV -->
  <nav id="bottomnav">
    <button class="nav-btn active" data-screen="screen-verif">
      <span class="nav-icon">🔍</span>
      <span class="nav-label">Vérificateur</span>
    </button>
    <button class="nav-btn" data-screen="screen-ref">
      <span class="nav-icon">📚</span>
      <span class="nav-label">Références</span>
    </button>
  </nav>

</div>

];

// ══════════════════════════════════
// LOGIQUE — VÉRIFICATEUR
// ══════════════════════════════════
let activeCat = "all";
let activeRegion = "all";
let searchQ = "";

function buildCatPills() {
  const bar = document.getElementById('cats-bar');
  CATS.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'cat-pill';
    btn.dataset.cat = c.id;
    btn.innerHTML = `${c.icon} ${c.label}`;
    bar.appendChild(btn);
  });
  bar.addEventListener('click', e => {
    const btn = e.target.closest('.cat-pill');
    if(!btn) return;
    activeCat = btn.dataset.cat;
    document.querySelectorAll('.cat-pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    // Scroll into view
    btn.scrollIntoView({behavior:'smooth', block:'nearest', inline:'center'});
    renderCards();
  });
}

document.getElementById('region-bar').addEventListener('click', e => {
  const btn = e.target.closest('.region-btn');
  if(!btn) return;
  activeRegion = btn.dataset.region;
  document.querySelectorAll('.region-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
});

document.getElementById('search-input').addEventListener('input', e => {
  searchQ = e.target.value.trim().toLowerCase();
  renderCards();
});

function filtered() {
  return DATA.filter(d => {
    if(activeCat !== 'all' && d.cat !== activeCat) return false;
    if(activeRegion !== 'all' && d.region !== activeRegion) return false;
    if(searchQ) {
      const hay = (d.country + d.code + d.links.map(l=>l.label).join(' ')).toLowerCase();
      if(!hay.includes(searchQ)) return false;
    }
    return true;
  });
}

function cardHTML(d) {
  const links = d.links.map(l => `
    <div class="link-row">
      <a class="link-btn" href="${l.url}" target="_blank" rel="noopener">
        <span style="flex:1">${l.label}</span>
        <span class="link-ext">↗</span>
      </a>
      <span class="tag ${TAG_CSS[l.tag]||'t-partial'}">${TAG_LABEL[l.tag]||l.tag}</span>
      ${l.translate ? `<a class="tr-btn" href="https://translate.google.com/translate?sl=auto&tl=fr&u=${encodeURIComponent(l.url)}" target="_blank" rel="noopener" title="Traduire">🌐</a>` : ''}
    </div>
  `).join('');

  return `<div class="country-card">
    <div class="card-head">
      <span class="card-flag">${d.flag}</span>
      <div>
        <div class="card-name">${d.country}</div>
        <div class="card-code">${d.code}</div>
      </div>
    </div>
    <div class="card-links">${links}</div>
  </div>`;
}

function renderCards() {
  const list = filtered();
  const total = list.reduce((s,d) => s + d.links.length, 0);
  document.getElementById('count-bar').textContent = `${list.length} pays · ${total} liens`;

  const eu = list.filter(d => d.region === 'EU' || d.region === 'International');
  const monde = list.filter(d => d.region === 'Monde');

  let html = '';
  if(eu.length > 0) {
    html += `<div class="region-sep">🌍 Europe</div>`;
    html += eu.map(cardHTML).join('');
  }
  if(monde.length > 0) {
    html += `<div class="region-sep">🌐 Reste du monde</div>`;
    html += monde.map(cardHTML).join('');
  }
  if(!html) {
    html = `<div class="empty-state"><div class="empty-icon">🔍</div><p>Aucun résultat</p></div>`;
  }

  document.getElementById('cards-list').innerHTML = html;
}

// ══════════════════════════════════
// LOGIQUE — BASES DE RÉFÉRENCE
// ══════════════════════════════════
function renderRefs() {
  const list = document.getElementById('ref-list');
  list.innerHTML = REFS.map(r => `
    <div class="ref-card">
      <div class="ref-card-head">
        <div class="ref-type">${r.type}</div>
        <div class="ref-title">${r.title}</div>
        <div class="ref-origin">${r.origin}</div>
      </div>
      <div class="ref-body">
        <p class="ref-desc">${r.desc}</p>
        <div class="ref-tags">
          ${r.tags.map(t => `<span class="rtag ${t.css}">${t.label}</span>`).join('')}
        </div>
        <div class="ref-actions">
          <a class="ref-btn-main" href="${r.url}" target="_blank" rel="noopener">🔗 Accéder</a>
          ${r.translate ? `<a class="ref-btn-tr" href="https://translate.google.com/translate?sl=auto&tl=fr&u=${encodeURIComponent(r.url)}" target="_blank" rel="noopener" title="Traduire en français">🌐</a>` : ''}
        </div>
      </div>
    </div>
  `).join('');
}

// ══════════════════════════════════
// NAVIGATION
// ══════════════════════════════════
document.getElementById('bottomnav').addEventListener('click', e => {
  const btn = e.target.closest('.nav-btn');
  if(!btn) return;
  const screenId = btn.dataset.screen;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(screenId).classList.add('active');
  btn.classList.add('active');
});

// ══════════════════════════════════
// INIT
// ══════════════════════════════════
buildCatPills();
renderCards();
renderRefs();
</script>
</body>
</html>
